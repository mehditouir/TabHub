name: Deploy Infrastructure

# Run manually or when infra files change on main
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'infra/**'

env:
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    name: Bicep deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # Create resource group if it doesn't exist
      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location francecentral \
            --output none

      # Deploy Bicep — passes secrets as parameters inline (never written to disk)
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters \
              dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" \
              jwtKey="${{ secrets.JWT_PROD_KEY }}" \
            --output none
          echo "✅ Bicep deployment complete"

      # Print non-secret outputs for first-time setup guidance
      - name: Show outputs
        run: |
          echo "=== Deployment Outputs ==="
          az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name main \
            --query "{apiUrl:properties.outputs.apiUrl.value, swaUrl:properties.outputs.swaUrl.value, keyVaultName:properties.outputs.keyVaultName.value}" \
            --output json
          echo ""
          echo "ACTION REQUIRED after first deploy:"
          echo "1. Get SWA deployment token from Azure Portal:"
          echo "   Portal → Static Web Apps → web-tabhub → Manage deployment token"
          echo "   Add as GitHub secret: SWA_DEPLOYMENT_TOKEN"
          echo "2. Confirm VITE_API_URL secret = https://api-tabhub.azurewebsites.net"
          echo "3. Run backend and frontend workflows to deploy the apps"
