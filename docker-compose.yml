services:
  postgres:
    image: postgres:15-alpine
    container_name: tabhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tabhub
      POSTGRES_USER: tabhub
      POSTGRES_PASSWORD: tabhub_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabhub -d tabhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
